node_types:
  document:
    - Document
    - Chunk
  lightweight:
    - Preference
    - WorkflowHint
    - ToolConfig
    - ProjectState
    - ProjectDecision
    - Todo
    - SessionNote
  research:
    - Concept
    - Claim
    - Hypothesis
    - Evidence
    - Experiment
    - Result
    - Question
    - Task
edge_rules:
  MENTIONS:
    reasoning_allowed: false
  RELATED_TO:
    reasoning_allowed: false
  SUPPORTED_BY:
    reasoning_allowed: true
  CONTRADICTED_BY:
    reasoning_allowed: true
  TESTED_BY:
    reasoning_allowed: true
  PRODUCES:
    reasoning_allowed: true
  EVIDENCE_FOR:
    reasoning_allowed: true

